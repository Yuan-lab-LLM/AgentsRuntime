name: Build and push runtime images to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-images:
    name: Discover image directories
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      date_tag: ${{ steps.meta.outputs.date_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build date tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "date_tag=$(TZ=Asia/Shanghai date '+v%Y.%-m.%-d')" >> "${GITHUB_OUTPUT}"

      - name: Discover top-level image directories
        id: discover
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "This workflow must run on the default branch (${DEFAULT_BRANCH}), current ref is ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          entries=()

          shopt -s nullglob
          for dir_path in */; do
            dir="${dir_path%/}"
            if [[ "${dir}" == .* ]]; then
              continue
            fi

            manifest="${dir}/.runtime-image.json"
            if [ -f "${manifest}" ]; then
              runtime="$(jq -r --arg dir "${dir}" '.runtime // $dir' "${manifest}")"
              context="$(jq -r --arg dir "${dir}" '.context // ("./" + $dir)' "${manifest}")"
              dockerfile="$(jq -r '.dockerfile // empty' "${manifest}")"
              image="$(jq -r --arg repo_lower "${repo_lower}" --arg runtime "${runtime}" '.image // ("ghcr.io/" + $repo_lower + "/" + $runtime)' "${manifest}")"

              if [ -z "${runtime}" ] || [ -z "${context}" ] || [ -z "${dockerfile}" ]; then
                echo "Invalid runtime image manifest: ${manifest}" >&2
                exit 1
              fi
              if [ ! -d "${context}" ]; then
                echo "Build context does not exist for ${runtime}: ${context}" >&2
                exit 1
              fi
              if [ ! -f "${dockerfile}" ]; then
                echo "Dockerfile does not exist for ${runtime}: ${dockerfile}" >&2
                exit 1
              fi

              entry="$(
                jq -cn \
                  --arg runtime "${runtime}" \
                  --arg context "${context}" \
                  --arg dockerfile "${dockerfile}" \
                  --arg image "${image}" \
                  '{
                    runtime: $runtime,
                    context: $context,
                    dockerfile: $dockerfile,
                    image: $image
                  }'
              )"
              entries+=("${entry}")
              continue
            fi

            dockerfile=""
            if [ -f "${dir}/Dockerfile.${dir}" ]; then
              dockerfile="${dir}/Dockerfile.${dir}"
            elif [ -f "${dir}/Dockerfile" ]; then
              dockerfile="${dir}/Dockerfile"
            else
              matches=("${dir}"/Dockerfile.*)
              if [ "${#matches[@]}" -eq 1 ] && [ -f "${matches[0]}" ]; then
                dockerfile="${matches[0]}"
              fi
            fi

            if [ -z "${dockerfile}" ]; then
              continue
            fi

            entry="$(
              jq -cn \
                --arg runtime "${dir}" \
                --arg context "./${dir}" \
                --arg dockerfile "./${dockerfile}" \
                --arg image "ghcr.io/${repo_lower}/${dir}" \
                '{
                  runtime: $runtime,
                  context: $context,
                  dockerfile: $dockerfile,
                  image: $image
                }'
            )"
            entries+=("${entry}")
          done

          if [ "${#entries[@]}" -eq 0 ]; then
            echo "No top-level image directories were found." >&2
            exit 1
          fi

          matrix_json="$(printf '%s\n' "${entries[@]}" | jq -sc '{include: .}')"
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  build-and-push:
    name: Build ${{ matrix.runtime }}
    needs: discover-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-images.outputs.matrix) }}
    env:
      DATE_TAG: ${{ needs.discover-images.outputs.date_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve reproducible build timestamp
        id: stamp
        shell: bash
        run: |
          set -euo pipefail
          echo "source_date_epoch=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build candidate image and resolve digest
        id: candidate
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          RUNTIME: ${{ matrix.runtime }}
          SOURCE_DATE_EPOCH: ${{ steps.stamp.outputs.source_date_epoch }}
        run: |
          set -euo pipefail

          metadata_file="$(mktemp)"

          labels=(
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            --label "org.opencontainers.image.title=${RUNTIME}"
          )

          docker buildx build \
            --file "${DOCKERFILE}" \
            --platform linux/amd64,linux/arm64 \
            --pull \
            --provenance=false \
            --sbom=false \
            --build-arg BUILDKIT_MULTI_PLATFORM=1 \
            --build-arg SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --cache-from "type=gha,scope=${RUNTIME}" \
            --metadata-file "${metadata_file}" \
            --output "type=image,name=${IMAGE}:build-check" \
            "${labels[@]}" \
            "${CONTEXT}"

          candidate_digest="$(jq -r '."containerimage.digest" // empty' "${metadata_file}")"
          if [ -z "${candidate_digest}" ]; then
            echo "Unable to resolve candidate digest for ${RUNTIME}." >&2
            cat "${metadata_file}" >&2
            exit 1
          fi

          echo "candidate_digest=${candidate_digest}" >> "${GITHUB_OUTPUT}"

      - name: Compare against remote latest
        id: compare
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          CANDIDATE_DIGEST: ${{ steps.candidate.outputs.candidate_digest }}
        run: |
          set -euo pipefail

          remote_digest=""
          if manifest_json="$(docker buildx imagetools inspect "${IMAGE}:latest" --format '{{json .Manifest}}' 2>/dev/null)"; then
            remote_digest="$(echo "${manifest_json}" | jq -r '.digest // empty')"
          fi

          changed=true
          if [ -n "${remote_digest}" ] && [ "${remote_digest}" = "${CANDIDATE_DIGEST}" ]; then
            changed=false
          fi

          echo "remote_digest=${remote_digest}" >> "${GITHUB_OUTPUT}"
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

      - name: Push latest and date tags
        if: steps.compare.outputs.changed == 'true'
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          RUNTIME: ${{ matrix.runtime }}
          SOURCE_DATE_EPOCH: ${{ steps.stamp.outputs.source_date_epoch }}
        run: |
          set -euo pipefail

          labels=(
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            --label "org.opencontainers.image.title=${RUNTIME}"
          )

          docker buildx build \
            --file "${DOCKERFILE}" \
            --platform linux/amd64,linux/arm64 \
            --pull \
            --provenance=false \
            --sbom=false \
            --build-arg BUILDKIT_MULTI_PLATFORM=1 \
            --build-arg SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --cache-from "type=gha,scope=${RUNTIME}" \
            --cache-to "type=gha,mode=max,scope=${RUNTIME}" \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${DATE_TAG}" \
            --push \
            "${labels[@]}" \
            "${CONTEXT}"

      - name: Summarize result
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          RUNTIME: ${{ matrix.runtime }}
          CANDIDATE_DIGEST: ${{ steps.candidate.outputs.candidate_digest }}
          REMOTE_DIGEST: ${{ steps.compare.outputs.remote_digest }}
          CHANGED: ${{ steps.compare.outputs.changed }}
        run: |
          {
            echo "### ${RUNTIME}"
            echo ""
            echo "- image: \`${IMAGE}\`"
            echo "- date tag: \`${DATE_TAG}\`"
            echo "- candidate digest: \`${CANDIDATE_DIGEST}\`"
            if [ -n "${REMOTE_DIGEST}" ]; then
              echo "- remote latest digest: \`${REMOTE_DIGEST}\`"
            else
              echo "- remote latest digest: \`<missing>\`"
            fi
            if [ "${CHANGED}" = "true" ]; then
              echo "- result: pushed \`latest\` and \`${DATE_TAG}\`"
            else
              echo "- result: skipped push because candidate matches remote \`latest\`"
            fi
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"
