name: Build and push runtime images to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-images:
    name: Discover image directories
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      date_tag: ${{ steps.meta.outputs.date_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build date tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "date_tag=$(TZ=Asia/Shanghai date '+v%Y.%-m.%-d')" >> "${GITHUB_OUTPUT}"

      - name: Discover top-level image directories
        id: discover
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "This workflow must run on the default branch (${DEFAULT_BRANCH}), current ref is ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          repo_lower="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          entries=()

          shopt -s nullglob
          for dir_path in */; do
            dir="${dir_path%/}"
            if [[ "${dir}" == .* ]]; then
              continue
            fi

            manifest="${dir}/.runtime-image.json"
            if [ -f "${manifest}" ]; then
              runtime="$(jq -r --arg dir "${dir}" '.runtime // $dir' "${manifest}")"
              context="$(jq -r --arg dir "${dir}" '.context // ("./" + $dir)' "${manifest}")"
              dockerfile="$(jq -r '.dockerfile // empty' "${manifest}")"
              image="$(jq -r --arg repo_lower "${repo_lower}" --arg runtime "${runtime}" '.image // ("ghcr.io/" + $repo_lower + "/" + $runtime)' "${manifest}")"

              if [ -z "${runtime}" ] || [ -z "${context}" ] || [ -z "${dockerfile}" ]; then
                echo "Invalid runtime image manifest: ${manifest}" >&2
                exit 1
              fi
              if [ ! -d "${context}" ]; then
                echo "Build context does not exist for ${runtime}: ${context}" >&2
                exit 1
              fi
              if [ ! -f "${dockerfile}" ]; then
                echo "Dockerfile does not exist for ${runtime}: ${dockerfile}" >&2
                exit 1
              fi

              entry="$(
                jq -cn \
                  --arg runtime "${runtime}" \
                  --arg context "${context}" \
                  --arg dockerfile "${dockerfile}" \
                  --arg image "${image}" \
                  '{
                    runtime: $runtime,
                    context: $context,
                    dockerfile: $dockerfile,
                    image: $image
                  }'
              )"
              entries+=("${entry}")
              continue
            fi

            dockerfile=""
            if [ -f "${dir}/Dockerfile.${dir}" ]; then
              dockerfile="${dir}/Dockerfile.${dir}"
            elif [ -f "${dir}/Dockerfile" ]; then
              dockerfile="${dir}/Dockerfile"
            else
              matches=("${dir}"/Dockerfile.*)
              if [ "${#matches[@]}" -eq 1 ] && [ -f "${matches[0]}" ]; then
                dockerfile="${matches[0]}"
              fi
            fi

            if [ -z "${dockerfile}" ]; then
              continue
            fi

            entry="$(
              jq -cn \
                --arg runtime "${dir}" \
                --arg context "./${dir}" \
                --arg dockerfile "./${dockerfile}" \
                --arg image "ghcr.io/${repo_lower}/${dir}" \
                '{
                  runtime: $runtime,
                  context: $context,
                  dockerfile: $dockerfile,
                  image: $image
                }'
            )"
            entries+=("${entry}")
          done

          if [ "${#entries[@]}" -eq 0 ]; then
            echo "No top-level image directories were found." >&2
            exit 1
          fi

          matrix_json="$(printf '%s\n' "${entries[@]}" | jq -sc '{include: .}')"
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  build-amd64:
    name: Build ${{ matrix.runtime }} linux/amd64
    needs: discover-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-images.outputs.matrix) }}
    env:
      DATE_TAG: ${{ needs.discover-images.outputs.date_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve reproducible build timestamp
        id: stamp
        shell: bash
        run: |
          set -euo pipefail
          echo "source_date_epoch=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          RUNTIME: ${{ matrix.runtime }}
          ARCH: amd64
          PLATFORM: linux/amd64
          SOURCE_DATE_EPOCH: ${{ steps.stamp.outputs.source_date_epoch }}
        run: |
          set -euo pipefail

          labels=(
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            --label "org.opencontainers.image.title=${RUNTIME}"
          )

          docker buildx build \
            --file "${DOCKERFILE}" \
            --platform "${PLATFORM}" \
            --pull \
            --provenance=false \
            --sbom=false \
            --build-arg BUILDKIT_MULTI_PLATFORM=1 \
            --build-arg SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --cache-from "type=gha,scope=${RUNTIME}-${ARCH}" \
            --cache-to "type=gha,mode=max,scope=${RUNTIME}-${ARCH}" \
            --tag "${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ARCH}" \
            --push \
            "${labels[@]}" \
            "${CONTEXT}"

      - name: Summarize amd64 image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          RUNTIME: ${{ matrix.runtime }}
          ARCH: amd64
        run: |
          {
            echo "### ${RUNTIME} ${ARCH}"
            echo ""
            echo "- image: \`${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ARCH}\`"
            echo "- platform: \`linux/${ARCH}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

  build-arm64:
    name: Build ${{ matrix.runtime }} linux/arm64
    needs: discover-images
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-images.outputs.matrix) }}
    env:
      DATE_TAG: ${{ needs.discover-images.outputs.date_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve reproducible build timestamp
        id: stamp
        shell: bash
        run: |
          set -euo pipefail
          echo "source_date_epoch=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          RUNTIME: ${{ matrix.runtime }}
          ARCH: arm64
          PLATFORM: linux/arm64
          SOURCE_DATE_EPOCH: ${{ steps.stamp.outputs.source_date_epoch }}
        run: |
          set -euo pipefail

          labels=(
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            --label "org.opencontainers.image.title=${RUNTIME}"
          )

          docker buildx build \
            --file "${DOCKERFILE}" \
            --platform "${PLATFORM}" \
            --pull \
            --provenance=false \
            --sbom=false \
            --build-arg BUILDKIT_MULTI_PLATFORM=1 \
            --build-arg SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --cache-from "type=gha,scope=${RUNTIME}-${ARCH}" \
            --cache-to "type=gha,mode=max,scope=${RUNTIME}-${ARCH}" \
            --tag "${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ARCH}" \
            --push \
            "${labels[@]}" \
            "${CONTEXT}"

      - name: Summarize arm64 image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          RUNTIME: ${{ matrix.runtime }}
          ARCH: arm64
        run: |
          {
            echo "### ${RUNTIME} ${ARCH}"
            echo ""
            echo "- image: \`${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ARCH}\`"
            echo "- platform: \`linux/${ARCH}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-manifest:
    name: Publish ${{ matrix.runtime }} manifest
    needs:
      - discover-images
      - build-amd64
      - build-arm64
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-images.outputs.matrix) }}
    env:
      DATE_TAG: ${{ needs.discover-images.outputs.date_tag }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${DATE_TAG}" \
            "${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-amd64" \
            "${IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-arm64"

      - name: Summarize result
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          RUNTIME: ${{ matrix.runtime }}
        run: |
          {
            echo "### ${RUNTIME}"
            echo ""
            echo "- image: \`${IMAGE}\`"
            echo "- date tag: \`${DATE_TAG}\`"
            echo "- platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo "- result: pushed \`latest\` and \`${DATE_TAG}\` multi-arch manifests"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"
