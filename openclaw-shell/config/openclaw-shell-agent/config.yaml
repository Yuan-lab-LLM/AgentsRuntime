enabled: false
runtime_type: openclaw-shell
runtime_name: OpenClaw Shell
desktop_base: none
runtime_port: 18789
instance_id: ""
bootstrap_token: ""
control_plane_base_url: ""
agent_data_dir: /config/openclaw-shell-agent
disk_usage_path: /config
initial_config_revision_id: ""
protocol_version: v1
local_http_bind: 0.0.0.0:18080
log_file_path: /config/openclaw-shell-agent/logs/agent.log
openclaw_command:
  - openclaw
  - gateway
  - run
openclaw_doctor_command:
  - openclaw
  - doctor
  - --fix
openclaw_doctor_policy: auto
startup_notification_message: ""
startup_repair_notification_message: ""
openclaw_config_path: /config/.openclaw/openclaw.json
openclaw_workspace_path: /config/.openclaw/workspace
openclaw_skills_path: /config/.openclaw/workspace/skills
openclaw_builtin_skills_path: /usr/local/lib/node_modules/openclaw/skills
openclaw_health_url: http://127.0.0.1:18789/health
openclaw_startup_health_timeout: 90s
openclaw_defaults_dir: /defaults/.openclaw
autostart_defaults_dir: ""
autostart_target_dir: ""
openclaw_extensions_dir: /config/.openclaw/extensions
openclaw_bundled_extensions_dir: /usr/local/lib/node_modules/openclaw/dist/extensions
installed_plugin_path_prefix: /defaults/.openclaw/extensions/
drop_user_name: abc
browser_auto_launch_enabled: false
browser_executable: ""
browser_url: ""
wayland_socket_path: ""
browser_launch_wayland_timeout: 1s
browser_launch_extra_delay: 0s
heartbeat_interval: 15s
state_report_interval: 5s
command_poll_interval: 5s
command_poll_backoff_max: 60s
register_retry_interval: 10s
process_stop_timeout: 20s
skill_incremental_interval: 30s
skill_full_sync_interval: 12h
max_auto_restart: 3
